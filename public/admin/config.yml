backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "public/content/home.json"
        label: "Home Page"
        name: "home"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string", required: false }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Philosophy Title", name: "philosophyTitle", widget: "string", required: false }
          - { label: "Philosophy Body", name: "philosophyBody", widget: "text", required: false }
      - file: "public/content/cabins.json"
        label: "Cabins Page"
        name: "cabins"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string", required: false }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - label: "Cabins List"
            name: "cabinsList"
            widget: "list"
            required: false
            fields:
              - { label: "Name", name: "name", widget: "string", required: false }
              - { label: "Sleeps", name: "sleeps", widget: "string", required: false }
              - { label: "Bedrooms", name: "bedrooms", widget: "string", required: false }
              - { label: "Baths", name: "baths", widget: "number", value_type: "float", required: false }
              - { label: "Description", name: "desc", widget: "text", required: false }
              - { label: "Status", name: "status", widget: "select", options: ["Available", "Coming Soon", "Booked"], required: false }
              - { label: "Square Footage", name: "sqFt", widget: "string", required: false }
              - { label: "Location", name: "location", widget: "string", required: false }
              - { label: "Features", name: "features", widget: "list", field: { label: "Feature", name: "feature", widget: "string" }, required: false }
              - label: "Sleeping Arrangements"
                name: "sleepingArrangements"
                widget: "list"
                required: false
                fields:
                  - { label: "Room", name: "room", widget: "string", required: false }
                  - { label: "Bed", name: "bed", widget: "string", required: false }
              - { label: "Images", name: "images", widget: "list", field: { label: "Image", name: "image", widget: "image" }, required: false }
              - { label: "Booking Link", name: "bookingLink", widget: "string", required: false }
          - { label: "Intro Title", name: "introTitle", widget: "string", required: false }
          - { label: "Intro Body", name: "introBody", widget: "text", required: false }
      - file: "public/content/comfort.json"
        label: "Comfort & Convenience Page"
        name: "comfort"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string", required: false }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - file: "public/content/gather.json"
        label: "Gather & Connect Page"
        name: "gather"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string", required: false }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - file: "public/content/beyond.json"
        label: "Beyond the Cabin Page"
        name: "beyond"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string", required: false }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - file: "public/content/family.json"
        label: "Become Family Page"
        name: "family"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string", required: false }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string", required: false }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
